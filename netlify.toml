# ══════════════════════════════════════════════════════════════════
# Makazi Estate — Netlify Build Configuration
# ══════════════════════════════════════════════════════════════════

[build]
  base    = "real_estate_app"
  publish = "build/web"
  command = """
    set -e

    # ── 1. Install Flutter (cached between builds) ──────────────────
    export FLUTTER_HOME="$HOME/flutter"
    if [ ! -d "$FLUTTER_HOME" ]; then
      echo "Installing Flutter..."
      git clone https://github.com/flutter/flutter.git \
        -b stable --depth 1 "$FLUTTER_HOME"
    fi
    export PATH="$PATH:$FLUTTER_HOME/bin"
    flutter --version

    # ── 2. Write .env from Netlify environment variables ────────────
    cat > assets/.env <<ENV
SUPABASE_URL=${SUPABASE_URL}
SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
GOOGLE_WEB_CLIENT_ID=${GOOGLE_WEB_CLIENT_ID}
SELCOM_BACKEND_URL=${SELCOM_BACKEND_URL}
DIRECT_ADS_ENABLED=true
MIN_CPM_RATE=1500
MIN_CPC_RATE=400
AD_FREQUENCY_FREE=5
AD_FREQUENCY_BASIC=10
APP_VERSION=1.0.0
APP_ENVIRONMENT=production
API_TIMEOUT=30000
ENABLE_VIDEO_TOURS=true
ENABLE_VIRTUAL_TOURS=true
ENABLE_CHAT=true
ENABLE_NOTIFICATIONS=true
ENV

    # ── 3. Get dependencies & build ─────────────────────────────────
    flutter pub get
    flutter build web --release --base-href /
  """

# ── SPA Routing: send all routes to Flutter's index.html ──────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────

# WASM files (CanvasKit renderer) — must be served as application/wasm
# and need COOP/COEP for SharedArrayBuffer (skwasm renderer)
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type                       = "application/wasm"
    Cross-Origin-Embedder-Policy       = "require-corp"
    Cross-Origin-Opener-Policy         = "same-origin"

[[headers]]
  for = "/canvaskit/*"
  [headers.values]
    Cross-Origin-Embedder-Policy       = "require-corp"
    Cross-Origin-Opener-Policy         = "same-origin"

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                    = "SAMEORIGIN"
    X-Content-Type-Options             = "nosniff"
    Referrer-Policy                    = "strict-origin-when-cross-origin"
    Permissions-Policy                 = "camera=(), microphone=(), geolocation=(self)"
