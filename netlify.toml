# ══════════════════════════════════════════════════════════════════
# Makazi Estate — Netlify Build Configuration
# ══════════════════════════════════════════════════════════════════

[build]
  base    = "real_estate_app"
  publish = "build/web"
  command = """
    set -e

    # ── 1. Install Flutter (cached between builds) ──────────────────
    export FLUTTER_HOME="$HOME/flutter"
    if [ ! -d "$FLUTTER_HOME" ]; then
      echo "Installing Flutter..."
      git clone https://github.com/flutter/flutter.git \
        -b stable --depth 1 "$FLUTTER_HOME"
    fi
    export PATH="$PATH:$FLUTTER_HOME/bin"
    flutter --version

    # ── 2. Write .env from Netlify environment variables ────────────
    echo "Writing assets/.env ..."
    mkdir -p assets

    {
      echo "SUPABASE_URL=$SUPABASE_URL"
      echo "SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"
      echo "GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID"
      echo "SELCOM_BACKEND_URL=${SELCOM_BACKEND_URL:-}"
      echo "DIRECT_ADS_ENABLED=true"
      echo "MIN_CPM_RATE=1500"
      echo "MIN_CPC_RATE=400"
      echo "AD_FREQUENCY_FREE=5"
      echo "AD_FREQUENCY_BASIC=10"
      echo "APP_VERSION=1.0.0"
      echo "APP_ENVIRONMENT=production"
      echo "API_TIMEOUT=30000"
      echo "ENABLE_VIDEO_TOURS=true"
      echo "ENABLE_VIRTUAL_TOURS=true"
      echo "ENABLE_CHAT=true"
      echo "ENABLE_NOTIFICATIONS=true"
    } > assets/.env

    # ── 3. Verify .env was written correctly ─────────────────────────
    echo "=== Verifying .env ==="
    if grep -q "SUPABASE_URL=https" assets/.env; then
      echo "✅ SUPABASE_URL is set"
    else
      echo "❌ SUPABASE_URL is MISSING or EMPTY — check Netlify environment variables!"
      cat assets/.env
      exit 1
    fi
    ANON_VAL=$(grep "SUPABASE_ANON_KEY=" assets/.env | cut -d= -f2-)
    if [ -n "$ANON_VAL" ]; then
      echo "✅ SUPABASE_ANON_KEY is set"
    else
      echo "❌ SUPABASE_ANON_KEY is MISSING or EMPTY — check Netlify environment variables!"
      exit 1
    fi

    # ── 4. Get dependencies & build ─────────────────────────────────
    flutter pub get
    flutter build web --release --base-href / \
      --dart-define=SUPABASE_URL="$SUPABASE_URL" \
      --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
      --dart-define=GOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID"
  """

# ── SPA Routing: send all routes to Flutter's index.html ──────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────

# WASM files (CanvasKit renderer) — must be served as application/wasm
# and need COOP/COEP for SharedArrayBuffer (skwasm renderer)
[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type                       = "application/wasm"
    Cross-Origin-Embedder-Policy       = "require-corp"
    Cross-Origin-Opener-Policy         = "same-origin"

[[headers]]
  for = "/canvaskit/*"
  [headers.values]
    Cross-Origin-Embedder-Policy       = "require-corp"
    Cross-Origin-Opener-Policy         = "same-origin"

# Global security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options                    = "SAMEORIGIN"
    X-Content-Type-Options             = "nosniff"
    Referrer-Policy                    = "strict-origin-when-cross-origin"
    Permissions-Policy                 = "camera=(), microphone=(), geolocation=(self)"
