# Supabase project configuration.
# Only the settings this project depends on are listed; the CLI fills defaults.

project_id = "qeddjlmexurmeiuslgqn"

# Image moderation (Gemini Flash-Lite). The Flutter client calls this with the
# publishable (anon) apikey, which is NOT a JWT — so JWT verification must be
# OFF or the gateway rejects every call with UNAUTHORIZED_INVALID_JWT_FORMAT.
# With this set, `supabase functions deploy validate-content` stays publicly
# callable without needing the --no-verify-jwt flag each time.
[functions.validate-content]
verify_jwt = false
