name: patamjengo_app
description: A real estate application for buying, selling, and renting properties
publish_to: 'none'
version: 1.0.0+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3

  # Functional Programming
  dartz: ^0.10.1

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0
  video_thumbnail: ^0.5.3
  visibility_detector: ^0.4.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Payments
  crypto: ^3.0.3

  # Media
  flutter_image_compress: ^2.1.0
  video_compress: ^3.1.2

  # Location & Country Detection
  geolocator: ^14.0.0
  geocoding: ^2.1.1
  phone_numbers_parser: ^8.1.0

  # Image & Video Handling
  image_picker: ^1.0.7
  image_cropper: ^8.0.0
  photo_view: ^0.14.0
  video_player: ^2.8.3
  chewie: ^1.6.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.4
  permission_handler: ^11.2.0
  equatable: ^2.0.5
  uuid: ^4.2.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  app_links: ^6.0.0
  flutter_dotenv: ^5.1.0
  logger: ^2.6.2

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  shimmer: ^3.0.0

  # Network
  http: ^1.1.0

  # Icons
  cupertino_icons: ^1.0.6

  # Sharing
  share_plus: ^12.0.1

  # Cache
  flutter_cache_manager: ^3.3.1

  # WebView
  webview_flutter: ^4.4.2

  # UI Extras
  flutter_spinkit: ^5.2.0

  # Push Notifications — FCM (Android, iOS, Web/PWA background) + local banners
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  mockito: ^5.4.4
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  import_sorter: ^4.6.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ic_launcher.png"
  web:
    generate: true
    image_path: "assets/images/ic_launcher.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/.env
    - assets/docs/
